<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qoo10 KPI トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f8f9fa;
  --surface2: #f0f2f5;
  --border: #e2e6ea;
  --border2: #d0d6de;
  --text-primary: #1a1d23;
  --text-secondary: #5a6472;
  --text-muted: #9aa3b0;
  --accent: #e8336d;
  --accent-light: #fff0f5;
  --blue: #2563eb;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --red: #dc2626;
  --red-light: #fef2f2;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --pre-mega: #7c3aed;
  --pre-mega-light: #f5f3ff;
  --post-mega: #0891b2;
  --post-mega-light: #ecfeff;
  --post-sale: #059669;
  --post-sale-light: #ecfdf5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.05);
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}

/* ── Header ── */
.app-header {
  background: #fff;
  border-bottom: 2px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: var(--shadow-sm);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #e8336d 0%, #ff6b9d 100%);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  color: white; font-size: 17px; font-weight: 700; font-family: 'DM Mono', monospace;
}
.logo-text { font-weight: 700; font-size: 15px; }
.logo-sub  { font-size: 11px; color: var(--text-muted); }
.header-spacer { flex: 1; }

/* Save status indicator */
.save-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.save-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.save-status.saving .save-dot  { background: var(--orange); animation: pulse 1s infinite; }
.save-status.saved  .save-dot  { background: var(--green); }
.save-status.error  .save-dot  { background: var(--red); }
.save-status.nosync .save-dot  { background: var(--text-muted); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.header-import-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: white; border: none;
  padding: 8px 18px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.header-import-btn:hover { opacity: .85; }

.settings-btn {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .15s;
}
.settings-btn:hover { border-color: var(--blue); }

.reload-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); color: var(--text-secondary);
  border: 1px solid var(--border); padding: 7px 14px;
  border-radius: var(--radius-sm); font-family: inherit;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.reload-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light, #eff6ff); }
.reload-btn.spinning { pointer-events: none; opacity: .6; }
.reload-btn.spinning .reload-icon { display: inline-block; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Brand nav ── */
.brand-nav {
  background: #fff; border-bottom: 2px solid var(--border);
  padding: 0 24px; display: flex; gap: 0; overflow-x: auto;
  position: sticky; top: 66px; z-index: 100;
}
.brand-nav-tab {
  display: flex; align-items: center; gap: 8px;
  padding: 13px 22px 11px; border: none; background: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; color: var(--text-muted);
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all .15s;
}
.brand-nav-tab:hover { color: var(--text-primary); }
.brand-nav-tab.active { font-weight: 700; }
.brand-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tab-count {
  font-size: 10px; background: var(--surface2);
  padding: 2px 7px; border-radius: 10px;
  font-family: 'DM Mono', monospace; font-weight: 600;
}

/* ── Main ── */
.main-wrap { max-width: 1600px; margin: 0 auto; padding: 24px; }

/* ── Controls ── */
.controls-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.period-legend {
  display: flex; align-items: center; gap: 14px;
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 14px; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--text-secondary); }
.legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.view-toggle {
  display: flex; background: var(--surface2);
  border-radius: var(--radius-sm); padding: 3px;
  border: 1px solid var(--border); margin-left: auto;
}
.view-btn {
  border: none; background: none; padding: 5px 14px; border-radius: 4px;
  font-family: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--text-muted); transition: all .15s;
}
.view-btn.active { background: #fff; color: var(--text-primary); box-shadow: var(--shadow-sm); }

/* Sort button */
.sort-select {
  padding: 6px 10px; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); font-family: inherit;
  font-size: 12px; color: var(--text-secondary);
  background: #fff; cursor: pointer; transition: border-color .15s;
}
.sort-select:focus { outline: none; border-color: var(--blue); }

/* Period visibility toggle */
.period-toggle-bar {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 12px;
}
.period-vis-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  border: 2px solid var(--border2); background: #fff;
  font-family: inherit; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s; color: var(--text-secondary);
}
.period-vis-btn.hidden {
  background: var(--surface2); border-style: dashed;
  opacity: .6;
}
.period-vis-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }

/* ── Empty state ── */
.brand-empty {
  text-align: center; padding: 64px 24px;
  background: var(--surface); border-radius: var(--radius);
  border: 2px dashed var(--border2);
}
.brand-empty-icon  { font-size: 44px; margin-bottom: 12px; }
.brand-empty-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.brand-empty-sub   { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.brand-empty-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: white; border: none; padding: 10px 20px;
  border-radius: var(--radius-sm); font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.brand-empty-btn:hover { opacity: .85; }

/* ── Table card ── */
.table-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow-sm); margin-bottom: 20px;
}
.scroll-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }

thead th {
  position: sticky; top: 0; background: var(--surface);
  padding: 0; border-bottom: 2px solid var(--border2);
  font-weight: 700; text-align: center;
  font-size: 11px; color: var(--text-secondary); white-space: nowrap;
}
.th-inner { padding: 9px 12px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
thead th.col-product {
  text-align: left; position: sticky; left: 0; z-index: 20;
  background: var(--surface); min-width: 220px; max-width: 300px;
}
thead th.col-product .th-inner { align-items: flex-start; }

.period-group-th { background: white !important; border-bottom: none !important; }
.period-group-inner {
  padding: 8px 14px 0;
  display: flex; align-items: center; gap: 7px; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.period-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
}

tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:hover { background: var(--surface); }
tbody tr:last-child { border-bottom: none; }
td { padding: 10px 12px; text-align: center; vertical-align: middle; font-size: 12px; }
td.col-product {
  text-align: left; position: sticky; left: 0;
  background: inherit; z-index: 5;
  padding: 10px 14px; border-right: 2px solid var(--border2);
}
tbody tr:hover td.col-product { background: var(--surface); }
.product-name {
  font-weight: 500; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; max-width: 280px; font-size: 11px;
}
.product-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.period-start { border-left: 2px solid var(--border2) !important; }
.metric-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; }
.delta {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 10px;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; margin-top: 3px;
}
.delta.up      { background: var(--green-light); color: var(--green); }
.delta.down    { background: var(--red-light);   color: var(--red); }
.delta.neutral { background: var(--surface2);    color: var(--text-muted); }

.pre-mega-style  { background: var(--pre-mega-light);  color: var(--pre-mega); }
.post-mega-style { background: var(--post-mega-light); color: var(--post-mega); }
.post-sale-style { background: var(--post-sale-light); color: var(--post-sale); }
.custom-style    { background: var(--orange-light);    color: var(--orange); }

tr.summary-row { background: var(--surface) !important; }
tr.summary-row td { border-top: 2px solid var(--border2); font-weight: 700; }

.period-delete-btn {
  width: 18px; height: 18px; border-radius: 50%;
  background: none; border: 1px solid currentColor;
  cursor: pointer; font-size: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-muted); padding: 0; transition: all .15s;
}
.period-delete-btn:hover { background: var(--red); border-color: var(--red); color: white; }

.add-period-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: white; border: none; padding: 7px 14px;
  border-radius: var(--radius-sm); font-family: inherit;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.add-period-btn:hover { opacity: .85; }

/* ── Modals ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; border-radius: var(--radius);
  padding: 28px; width: 480px; max-width: 95vw;
  box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-desc  { font-size: 12px; color: var(--text-muted); margin-bottom: 22px; }

.form-group  { margin-bottom: 16px; }
.form-label  { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-input, .form-select {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; color: var(--text-primary);
  background: #fff; transition: border-color .15s;
}
.form-input:focus, .form-select:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.form-input[readonly] { background: var(--surface); cursor: pointer; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

/* Brand chips */
.brand-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.brand-chip {
  padding: 8px 16px; border-radius: 20px;
  border: 2px solid var(--border2); background: #fff;
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s; color: var(--text-secondary);
}
.brand-chip.sel { color: white; }

.file-row { display: flex; gap: 8px; }
.file-row .form-input { flex: 1; }
.btn-file {
  background: var(--surface2); border: 1px solid var(--border2);
  padding: 9px 14px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; color: var(--text-secondary); transition: all .15s;
}
.btn-file:hover { border-color: var(--blue); color: var(--blue); }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.btn-cancel {
  background: none; border: 1px solid var(--border2);
  padding: 8px 18px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; cursor: pointer; color: var(--text-secondary); transition: all .15s;
}
.btn-cancel:hover { border-color: var(--text-secondary); }
.btn-confirm {
  background: var(--blue); color: white; border: none;
  padding: 8px 20px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.btn-confirm:hover  { opacity: .85; }
.btn-confirm:disabled { opacity: .4; cursor: not-allowed; }

/* Settings modal specific */
.settings-section {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 16px; margin-bottom: 16px;
  border: 1px solid var(--border);
}
.settings-section-title {
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}
.connection-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500; margin-bottom: 12px;
  border: 1px solid var(--border);
}
.connection-status.connected    { background: var(--green-light); border-color: #bbf7d0; color: var(--green); }
.connection-status.disconnected { background: var(--surface2);    color: var(--text-muted); }
.connection-status.error        { background: var(--red-light);   border-color: #fecaca; color: var(--red); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a1d23; color: white;
  padding: 12px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 9999;
  transform: translateY(80px); opacity: 0;
  transition: all .3s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center; gap: 8px;
  max-width: 360px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }
.toast.info    { background: var(--blue); }

@media (max-width: 768px) {
  .main-wrap { padding: 12px; }
  .app-header { padding: 10px 14px; }
  .brand-nav  { padding: 0 14px; top: 58px; }
  .period-legend { display: none; }
  .save-status span { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="logo">
    <div class="logo-icon">Q</div>
    <div>
      <div class="logo-text">Qoo10 KPIトラッカー</div>
      <div class="logo-sub">お気に入り・カートイン推移管理</div>
    </div>
  </div>
  <div class="header-spacer"></div>
  <div class="save-status nosync" id="saveStatus">
    <span class="save-dot"></span>
    <span id="saveStatusText">未接続</span>
  </div>
  <button class="reload-btn" id="reloadBtn" onclick="reloadFromGitHub()" title="最新データを取得">
    <span class="reload-icon">🔄</span> 再読み込み
  </button>
  <button class="settings-btn" onclick="openSettings()" title="GitHub設定">⚙️</button>
  <button class="header-import-btn" onclick="openModal(null)">＋ データを追加</button>
</header>

<!-- Brand nav -->
<nav class="brand-nav" id="brandNav"></nav>

<div class="main-wrap">
  <div id="controlsBar" style="display:none">
    <!-- Period visibility toggles -->
    <div class="period-toggle-bar" id="periodToggleBar">
      <span class="period-vis-label">📅 期間表示：</span>
    </div>
    <!-- Sort + View controls -->
    <div class="controls-bar" style="margin-bottom:0">
      <div class="period-legend" id="periodLegend"></div>
      <select class="sort-select" id="sortSelect" onchange="onSortChange(this.value)">
        <optgroup label="並べ替え（最新期間）">
          <option value="fav_desc">♥ お気に入り 多い順</option>
          <option value="fav_asc">♥ お気に入り 少ない順</option>
          <option value="cart_desc">🛒 カートイン 多い順</option>
          <option value="cart_asc">🛒 カートイン 少ない順</option>
        </optgroup>
        <optgroup label="並べ替え（増減）">
          <option value="fav_delta_desc">♥ お気に入り 増加順</option>
          <option value="fav_delta_asc">♥ お気に入り 減少順</option>
          <option value="cart_delta_desc">🛒 カートイン 増加順</option>
          <option value="cart_delta_asc">🛒 カートイン 減少順</option>
        </optgroup>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="viewBoth"  onclick="setView('both')">♥ + 🛒 両方</button>
        <button class="view-btn"        id="viewFav"   onclick="setView('fav')">♥ お気に入り</button>
        <button class="view-btn"        id="viewCart"  onclick="setView('cart')">🛒 カートイン</button>
      </div>
    </div>
  </div>
  <div id="tableArea"></div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">＋ データを追加</div>
    <div class="modal-desc">期間・ブランド・ファイルを選択してインポートしてください</div>
    <div class="form-group">
      <label class="form-label">期間名 <span style="color:var(--red)">*</span></label>
      <input type="text" class="form-input" id="periodName" placeholder="例：2024年9月 プレメガ前">
    </div>
    <div class="form-group">
      <label class="form-label">期間タイプ <span style="color:var(--red)">*</span></label>
      <select class="form-select" id="periodType">
        <option value="pre-mega">プレメガ前</option>
        <option value="post-mega">プレメガ後</option>
        <option value="post-sale">セール後</option>
        <option value="custom">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ブランド <span style="color:var(--red)">*</span></label>
      <div class="brand-chips" id="brandChips"></div>
    </div>
    <div class="form-group">
      <label class="form-label">ファイル（Excel / CSV）<span style="color:var(--red)">*</span></label>
      <div class="file-row">
        <input type="text" class="form-input" id="modalFileName" placeholder="ファイルを選択してください" readonly onclick="triggerFileInput()">
        <button class="btn-file" onclick="triggerFileInput()">選択</button>
      </div>
      <input type="file" id="modalFileInput" accept=".xlsx,.xls,.csv" style="display:none">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel"  onclick="closeModal()">キャンセル</button>
      <button class="btn-confirm" id="confirmBtn" onclick="confirmImport()" disabled>追加する</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-title">⚙️ GitHub 設定</div>
    <div class="modal-desc">データをGitHubに自動保存するための設定です</div>

    <div id="connectionStatusBox" class="connection-status disconnected">
      <span>●</span><span id="connectionText">未接続 — 設定を入力してください</span>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">GitHub 接続情報</div>
      <div class="form-group">
        <label class="form-label">GitHubユーザー名</label>
        <input type="text" class="form-input" id="ghUser" placeholder="例：yaya0820yaya">
      </div>
      <div class="form-group">
        <label class="form-label">リポジトリ名</label>
        <input type="text" class="form-input" id="ghRepo" placeholder="例：Qoo10-">
      </div>
      <div class="form-group">
        <label class="form-label">Personal Access Token（PAT）</label>
        <input type="password" class="form-input" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
        <div class="form-hint">⚠️ このトークンはあなたのブラウザにのみ保存されます。他の人には見えません。</div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-confirm" onclick="saveSettings()">接続して保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ══════════════════════════════════
//  Constants
// ══════════════════════════════════
const BRANDS = ['MilleFée', 'fractionalCC', 'cosmedeli', 'TOKOTOYZ'];
const BRAND_COLOR = { 'MilleFée':'#e8336d', 'fractionalCC':'#2563eb', 'cosmedeli':'#059669', 'TOKOTOYZ':'#7c3aed' };
const BRAND_EMOJI = { 'MilleFée':'🌸', 'fractionalCC':'💧', 'cosmedeli':'🌿', 'TOKOTOYZ':'⭐' };
const TYPE_LABEL  = { 'pre-mega':'プレメガ前', 'post-mega':'プレメガ後', 'post-sale':'セール後', 'custom':'その他' };
const TYPE_STYLE  = { 'pre-mega':'pre-mega-style', 'post-mega':'post-mega-style', 'post-sale':'post-sale-style', 'custom':'custom-style' };
const TYPE_COLOR  = { 'pre-mega':'#7c3aed', 'post-mega':'#0891b2', 'post-sale':'#059669', 'custom':'#ea580c' };
const DATA_FILE   = 'kpi_data.json';  // file saved in GitHub repo

// ══════════════════════════════════
//  State
// ══════════════════════════════════
let periods       = [];
let activeBrand   = 'MilleFée';
let currentView   = 'both';
let modalFileData = null;
let ghConfig      = { user: '', repo: '', token: '' };
let saveTimer     = null;
let sortState     = { key: 'fav', dir: 'desc' };
let hiddenPeriods = new Set();

// ══════════════════════════════════
//  Boot
// ══════════════════════════════════
loadLocalConfig();
buildBrandChips();
renderBrandNav();
renderTableArea();
if (ghConfig.user && ghConfig.repo && ghConfig.token) {
  loadFromGitHub();
}

// ══════════════════════════════════
//  LocalStorage config (token stays local, never uploaded)
// ══════════════════════════════════
function loadLocalConfig() {
  try {
    const c = JSON.parse(localStorage.getItem('qoo10_gh_config') || '{}');
    ghConfig.user  = c.user  || '';
    ghConfig.repo  = c.repo  || '';
    ghConfig.token = c.token || '';
  } catch(e) {}
}

function persistLocalConfig() {
  localStorage.setItem('qoo10_gh_config', JSON.stringify({
    user:  ghConfig.user,
    repo:  ghConfig.repo,
    token: ghConfig.token,
  }));
}

// ══════════════════════════════════
//  GitHub API
// ══════════════════════════════════
async function loadFromGitHub() {
  if (!isConfigured()) return;
  setSaveStatus('saving', '読み込み中...');
  try {
    // Publicリポジトリはraw URLで直接取得（CORSなし・トークン不要）
    const rawUrl = `https://raw.githubusercontent.com/${ghConfig.user}/${ghConfig.repo}/main/${DATA_FILE}?t=${Date.now()}`;
    const res = await fetch(rawUrl);
    if (res.status === 404) {
      setSaveStatus('saved', '接続済み（データなし）');
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    periods = data.periods || [];
    renderBrandNav();
    renderTableArea();
    setSaveStatus('saved', `最終同期: ${formatTime(new Date())}`);
    showToast('✅ データを読み込みました', 'success');
  } catch(e) {
    setSaveStatus('error', '読み込み失敗');
    showToast('❌ 読み込みに失敗しました: ' + e.message, 'error');
  }
}

async function reloadFromGitHub() {
  if (!isConfigured()) {
    showToast('⚙️ まずGitHub設定を行ってください', 'error');
    openSettings();
    return;
  }
  const btn = document.getElementById('reloadBtn');
  btn.classList.add('spinning');
  await loadFromGitHub();
  btn.classList.remove('spinning');
}

async function saveToGitHub() {
  if (!isConfigured()) return;
  setSaveStatus('saving', '保存中...');
  try {
    // Get current SHA (needed for update)
    let sha = null;
    const getRes = await fetch(
      `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${DATA_FILE}`,
      { headers: { Authorization: `token ${ghConfig.token}`, Accept: 'application/vnd.github.v3+json' } }
    );
    if (getRes.ok) {
      const existing = await getRes.json();
      sha = existing.sha;
    }

    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ periods }, null, 2))));
    const body = {
      message: `KPIデータ更新 ${new Date().toLocaleString('ja-JP')}`,
      content,
      ...(sha ? { sha } : {}),
    };

    const putRes = await fetch(
      `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${DATA_FILE}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `token ${ghConfig.token}`,
          Accept: 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      }
    );
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || `HTTP ${putRes.status}`);
    }
    setSaveStatus('saved', `最終保存: ${formatTime(new Date())}`);
    showToast('✅ GitHubに保存しました', 'success');
  } catch(e) {
    setSaveStatus('error', '保存失敗');
    showToast('❌ 保存に失敗しました: ' + e.message, 'error');
  }
}

function scheduleSave() {
  if (!isConfigured()) return;
  clearTimeout(saveTimer);
  setSaveStatus('saving', '保存待機中...');
  saveTimer = setTimeout(() => saveToGitHub(), 2000);
}

function isConfigured() {
  return ghConfig.user && ghConfig.repo && ghConfig.token;
}

// ══════════════════════════════════
//  Save status UI
// ══════════════════════════════════
function setSaveStatus(state, text) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status ' + state;
  document.getElementById('saveStatusText').textContent = text;
}

// ══════════════════════════════════
//  Settings modal
// ══════════════════════════════════
function openSettings() {
  document.getElementById('ghUser').value  = ghConfig.user;
  document.getElementById('ghRepo').value  = ghConfig.repo;
  document.getElementById('ghToken').value = ghConfig.token;
  updateConnectionStatus();
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function updateConnectionStatus() {
  const box  = document.getElementById('connectionStatusBox');
  const text = document.getElementById('connectionText');
  if (isConfigured()) {
    box.className  = 'connection-status connected';
    text.textContent = `✓ 接続済み — ${ghConfig.user}/${ghConfig.repo}`;
  } else {
    box.className  = 'connection-status disconnected';
    text.textContent = '未接続 — 設定を入力してください';
  }
}

async function saveSettings() {
  const user  = document.getElementById('ghUser').value.trim();
  const repo  = document.getElementById('ghRepo').value.trim();
  const token = document.getElementById('ghToken').value.trim();
  if (!user || !repo || !token) { showToast('すべての項目を入力してください', 'error'); return; }

  // Test connection
  setSaveStatus('saving', '接続確認中...');
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}`,
      { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error(`リポジトリにアクセスできません (HTTP ${res.status})`);
    ghConfig = { user, repo, token };
    persistLocalConfig();
    updateConnectionStatus();
    closeSettings();
    showToast('✅ GitHubに接続しました！', 'success');
    // Load existing data
    await loadFromGitHub();
    // If we have local data, save it
    if (periods.length > 0) scheduleSave();
  } catch(e) {
    setSaveStatus('error', '接続失敗');
    showToast('❌ ' + e.message, 'error');
  }
}

document.getElementById('settingsOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
});

// ══════════════════════════════════
//  Brand chips
// ══════════════════════════════════
function buildBrandChips() {
  document.getElementById('brandChips').innerHTML = BRANDS.map(b =>
    `<button class="brand-chip" data-val="${b}" onclick="selectChip(this)">${BRAND_EMOJI[b]} ${b}</button>`
  ).join('');
}

function selectChip(el) {
  document.querySelectorAll('.brand-chip').forEach(c => {
    c.classList.remove('sel');
    c.style.background = '#fff'; c.style.borderColor = 'var(--border2)'; c.style.color = 'var(--text-secondary)';
  });
  el.classList.add('sel');
  const col = BRAND_COLOR[el.dataset.val];
  el.style.background = col; el.style.borderColor = col; el.style.color = '#fff';
  validateModal();
}

// ══════════════════════════════════
//  Brand nav
// ══════════════════════════════════
function renderBrandNav() {
  document.getElementById('brandNav').innerHTML = BRANDS.map(b => {
    const cnt    = periods.filter(p => p.brand === b).length;
    const active = activeBrand === b;
    const col    = BRAND_COLOR[b];
    const style  = active ? `border-color:${col};color:${col}` : '';
    const cntSt  = active ? `background:${col};color:white` : '';
    return `<button class="brand-nav-tab ${active?'active':''}" data-brand="${b}"
      style="${style}" onclick="switchBrand('${b}')">
      <span class="brand-dot" style="background:${col}"></span>
      ${BRAND_EMOJI[b]} ${b}
      <span class="tab-count" style="${cntSt}">${cnt > 0 ? cnt+'期間' : '0'}</span>
    </button>`;
  }).join('');
}

function switchBrand(b) { activeBrand = b; renderBrandNav(); renderTableArea(); }

// ══════════════════════════════════
//  View toggle
// ══════════════════════════════════
function setView(v) {
  currentView = v;
  ['both','fav','cart'].forEach(x => {
    document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===v);
  });
  renderTableArea();
}

// ══════════════════════════════════
//  Main render
// ══════════════════════════════════
function renderTableArea() {
  const bp  = periods.filter(p => p.brand === activeBrand);
  const col = BRAND_COLOR[activeBrand];
  document.getElementById('controlsBar').style.display = periods.length ? 'flex' : 'none';
  renderLegend();
  renderPeriodToggles();
  const container = document.getElementById('tableArea');
  if (!bp.length) {
    container.innerHTML = `<div class="brand-empty">
      <div class="brand-empty-icon">${BRAND_EMOJI[activeBrand]}</div>
      <div class="brand-empty-title">${esc(activeBrand)} のデータがまだありません</div>
      <div class="brand-empty-sub">Excel / CSV をインポートして、お気に入り・カートイン推移を記録しましょう</div>
      <button class="brand-empty-btn" style="background:${col}" onclick="openModal('${activeBrand}')">＋ ${esc(activeBrand)} のデータを追加</button>
    </div>`;
    return;
  }

  // Filter out hidden periods
  const visibleBp = bp.filter(p => !hiddenPeriods.has(String(p.id)));

  // Build product map
  const pMap = new Map();
  visibleBp.forEach((period, pi) => {
    period.data.forEach(item => {
      const key = item.id || item.name;
      if (!pMap.has(key)) pMap.set(key, { id:item.id, name:item.name, vals:new Array(bp.length).fill(null) });
      pMap.get(key).vals[pi] = { fav:item.fav, cart:item.cart };
    });
  });
  // Apply sort
  const visIdx = bp.map((_,i)=>i); // all visible indices
  const lastVisIdx = visIdx[visIdx.length-1];
  const prods = [...pMap.values()].sort((a,b) => {
    const getVal = (prod, key) => {
      const cur  = prod.vals[lastVisIdx];
      const prev = lastVisIdx > 0 ? prod.vals.slice(0,lastVisIdx).filter(Boolean).pop() : null;
      if (key === 'fav')        return cur ? cur.fav  : 0;
      if (key === 'cart')       return cur ? cur.cart : 0;
      if (key === 'fav_delta')  return (cur && prev) ? cur.fav  - prev.fav  : -Infinity;
      if (key === 'cart_delta') return (cur && prev) ? cur.cart - prev.cart : -Infinity;
      return 0;
    };
    const av = getVal(a, sortState.key), bv = getVal(b, sortState.key);
    return sortState.dir === 'desc' ? bv - av : av - bv;
  });

  // thead
  let h1 = `<tr><th class="col-product" rowspan="2"><div class="th-inner">商品</div></th>`;
  visibleBp.forEach((p,i) => {
    const cols = currentView==='both'?4:2;
    h1 += `<th colspan="${cols}" class="period-group-th${i>0?' period-start':''}">
      <div class="period-group-inner">
        <span class="period-tag ${TYPE_STYLE[p.type]}">${TYPE_LABEL[p.type]}</span>
        <span style="font-size:12px;font-weight:600">${esc(p.name)}</span>
        <button class="period-delete-btn" onclick="deletePeriod('${p.id}')" title="削除">×</button>
      </div></th>`;
  });
  h1 += '</tr>';

  let h2 = '<tr>';
  visibleBp.forEach((p,i) => {
    const b = i>0?' period-start':'';
    if (currentView!=='cart') {
      h2 += `<th class="${b}"><div class="th-inner">♥<br>お気に入り</div></th>`;
      h2 += `<th><div class="th-inner">増減<br>${i>0?'前期比':'―'}</div></th>`;
    }
    if (currentView!=='fav') {
      const b2=(currentView==='cart'&&i>0)?' period-start':'';
      h2 += `<th class="${b2}"><div class="th-inner">🛒<br>カートイン</div></th>`;
      h2 += `<th><div class="th-inner">増減<br>${i>0?'前期比':'―'}</div></th>`;
    }
  });
  h2 += '</tr>';

  // tbody
  let tbody = '';
  prods.forEach(prod => {
    tbody += `<tr><td class="col-product">
      <div class="product-name" title="${esc(prod.name)}">${esc(prod.name)}</div>
      ${prod.id?`<div class="product-id"># ${esc(prod.id)}</div>`:''}
    </td>`;
    prod.vals.forEach((cur,i) => {
      const prev  = i>0?prod.vals.slice(0,i).filter(Boolean).pop():null;
      const bdr   = i>0?' period-start':'';
      if (currentView!=='cart') {
        const f=cur?cur.fav:null, pf=prev?prev.fav:null;
        tbody += `<td class="${bdr}">${f!=null?`<div class="metric-val">${f.toLocaleString()}</div>`:dash()}</td>`;
        tbody += `<td>${renderDelta(f!=null&&pf!=null?f-pf:null)}</td>`;
      }
      if (currentView!=='fav') {
        const c=cur?cur.cart:null, pc=prev?prev.cart:null;
        const b2=(currentView==='cart'&&i>0)?' period-start':'';
        tbody += `<td class="${b2}">${c!=null?`<div class="metric-val">${c.toLocaleString()}</div>`:dash()}</td>`;
        tbody += `<td>${renderDelta(c!=null&&pc!=null?c-pc:null)}</td>`;
      }
    });
    tbody += '</tr>';
  });

  // summary
  let sum = '<tr class="summary-row"><td class="col-product"><div class="product-name" style="font-weight:700">合計</div></td>';
  visibleBp.forEach((_,i) => {
    const cur  = prods.map(p=>p.vals[i]).filter(Boolean);
    const prev = i>0?prods.map(p=>p.vals.slice(0,i).filter(Boolean).pop()).filter(Boolean):[];
    const sf=cur.reduce((s,v)=>s+v.fav,0),  pf=prev.reduce((s,v)=>s+v.fav,0);
    const sc=cur.reduce((s,v)=>s+v.cart,0), pc=prev.reduce((s,v)=>s+v.cart,0);
    const bdr=i>0?' period-start':'';
    if (currentView!=='cart') {
      sum += `<td class="${bdr}"><div class="metric-val">${sf.toLocaleString()}</div></td>`;
      sum += `<td>${i>0?renderDelta(sf-pf):dash()}</td>`;
    }
    if (currentView!=='fav') {
      const b2=(currentView==='cart'&&i>0)?' period-start':'';
      sum += `<td class="${b2}"><div class="metric-val">${sc.toLocaleString()}</div></td>`;
      sum += `<td>${i>0?renderDelta(sc-pc):dash()}</td>`;
    }
  });
  sum += '</tr>';

  container.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text-muted)">${prods.length}商品 ・ ${visibleBp.length}期間（全${bp.length}期間）</span>
      <button class="add-period-btn" style="margin-left:auto;background:${col}" onclick="openModal('${activeBrand}')">＋ 期間を追加</button>
    </div>
    <div class="table-card">
      <div class="scroll-wrap">
        <table><thead>${h1}${h2}</thead><tbody>${tbody}${sum}</tbody></table>
      </div>
    </div>`;
}

function onSortChange(val) {
  const parts = val.split('_');
  // last part is dir (asc/desc), rest is key
  const dir = parts[parts.length-1];
  const key = parts.slice(0,-1).join('_');
  sortState = { key, dir };
  renderTableArea();
}

function togglePeriod(pid) {
  const key = String(pid);
  if (hiddenPeriods.has(key)) hiddenPeriods.delete(key);
  else hiddenPeriods.add(key);
  renderTableArea();
}

function renderPeriodToggles() {
  const bar = document.getElementById('periodToggleBar');
  const bp  = periods.filter(p => p.brand === activeBrand);
  if (!bp.length) { bar.innerHTML = ''; return; }
  const TYPE_COLOR_MAP = {'pre-mega':'#7c3aed','post-mega':'#0891b2','post-sale':'#059669','custom':'#ea580c'};
  bar.innerHTML = '<span class="period-vis-label">📅 期間表示：</span>' +
    bp.map(p => {
      const hidden = hiddenPeriods.has(String(p.id));
      const col    = TYPE_COLOR_MAP[p.type] || '#666';
      const style  = hidden ? '' : `background:${col}15;border-color:${col};color:${col}`;
      return `<button class="period-vis-btn ${hidden?'hidden':''}" style="${style}"
        onclick="togglePeriod('${p.id}')">
        ${hidden ? '☐' : '☑'} ${esc(p.name)}
      </button>`;
    }).join('');
}

function renderLegend() {
  const seen = new Set(); let html = '';
  periods.forEach(p => { if(!seen.has(p.type)){seen.add(p.type);html+=`<div class="legend-item"><span class="legend-dot" style="background:${TYPE_COLOR[p.type]}"></span>${TYPE_LABEL[p.type]}</div>`;} });
  document.getElementById('periodLegend').innerHTML = html;
}

// ══════════════════════════════════
//  Delete
// ══════════════════════════════════
function deletePeriod(pid) {
  const p = periods.find(x => String(x.id)===String(pid));
  if (!p || !confirm(`「${p.name}」を削除しますか？`)) return;
  periods = periods.filter(x => x.id!==p.id);
  renderBrandNav(); renderTableArea();
  scheduleSave();
}

// ══════════════════════════════════
//  Import modal
// ══════════════════════════════════
function openModal(brand) {
  modalFileData = null;
  document.getElementById('periodName').value = '';
  document.getElementById('periodType').value = 'pre-mega';
  document.getElementById('modalFileName').value = '';
  document.getElementById('confirmBtn').disabled = true;
  document.querySelectorAll('.brand-chip').forEach(c => {
    c.classList.remove('sel'); c.style.background='#fff'; c.style.borderColor='var(--border2)'; c.style.color='var(--text-secondary)';
  });
  if (brand) { const chip = document.querySelector(`.brand-chip[data-val="${brand}"]`); if(chip) selectChip(chip); }
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); modalFileData=null; }
function triggerFileInput() { document.getElementById('modalFileInput').click(); }

document.getElementById('modalFileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  document.getElementById('modalFileName').value = file.name;
  if (!document.getElementById('periodName').value)
    document.getElementById('periodName').value = file.name.replace(/\.[^.]+$/,'');
  readFile(file, rows => { modalFileData=rows; validateModal(); });
  e.target.value='';
});

document.getElementById('periodName').addEventListener('input', validateModal);

function validateModal() {
  const name=document.getElementById('periodName').value.trim();
  const brand=document.querySelector('.brand-chip.sel');
  document.getElementById('confirmBtn').disabled = !(name&&brand&&modalFileData);
}

function confirmImport() {
  const name=document.getElementById('periodName').value.trim();
  const type=document.getElementById('periodType').value;
  const chip=document.querySelector('.brand-chip.sel');
  if (!name||!chip||!modalFileData) return;
  periods.push({ id:Date.now(), name, type, brand:chip.dataset.val, data:modalFileData });
  activeBrand = chip.dataset.val;
  closeModal();
  renderBrandNav(); renderTableArea();
  scheduleSave();
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('modalOverlay')) closeModal();
});

// ══════════════════════════════════
//  File reading
// ══════════════════════════════════
function readFile(file, cb) {
  const reader = new FileReader();
  const isCSV  = file.name.toLowerCase().endsWith('.csv');
  reader.onload = e => {
    try {
      const wb = isCSV
        ? XLSX.read(e.target.result, {type:'string',codepage:65001})
        : XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {defval:''});
      cb(mapCols(raw));
    } catch(err) { alert('読み込みに失敗しました: '+err.message); cb([]); }
  };
  isCSV ? reader.readAsText(file,'UTF-8') : reader.readAsArrayBuffer(file);
}

function mapCols(rows) {
  if (!rows.length) return [];
  const h=Object.keys(rows[0]);
  const find=(...ks)=>h.find(c=>ks.some(k=>c.includes(k)));
  const idC=find('商品番号','product_id'), nameC=find('商品名','product_name','name');
  const favC=find('お気に入り','favorites','fav'), cartC=find('カート','cart');
  if (!nameC) return [];
  return rows.map(r=>({ id:idC?String(r[idC]||''):'', name:String(r[nameC]||''), fav:favC?(Number(r[favC])||0):0, cart:cartC?(Number(r[cartC])||0):0 })).filter(r=>r.name);
}

// ══════════════════════════════════
//  Helpers
// ══════════════════════════════════
function renderDelta(d) {
  if (d===null) return `<span style="color:var(--text-muted);font-size:10px">—</span>`;
  const cls=d>0?'up':d<0?'down':'neutral', arrow=d>0?'▲':d<0?'▼':'―';
  return `<span class="delta ${cls}">${arrow} ${d>0?'+':''}${d.toLocaleString()}</span>`;
}
function dash() { return `<span style="color:var(--text-muted)">—</span>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatTime(d) { return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}); }

// Toast
let toastTimer;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
